<!doctype html>
<html>
  <body>
    <article>
      <h1>Fast path article</h1>
      <p>
        This static article contains enough text for deterministic selection and
        exercises common Markdown structures without dynamic page behavior.
      </p>
      <h2>Structures</h2>
      <ul>
        <li>First item</li>
        <li>Second item</li>
      </ul>
      <pre><code class="language-python">print("hello")</code></pre>
      <table>
        <tr><th>Name</th><th>Value</th></tr>
        <tr><td>alpha</td><td>1</td></tr>
      </table>
      <span class="katex" data-tex="x^2"><span>x</span></span>
      <img alt="pixel" src="data:image/png;base64,iVBORw0KGgo=">
    </article>
  </body>
</html>
